    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #1a237e;
            --accent-gold: #ffc107;
            --white: #ffffff;
            --gray-light: #f5f5f5;
            --gray-medium: #e0e0e0;
            --gray-dark: #757575;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        /* Dark theme variables */
        [data-theme="dark"] {
            --primary-blue: #3949ab;
            --accent-gold: #ffb300;
            --white: #121212;
            --gray-light: #1e1e1e;
            --gray-medium: #2d2d2d;
            --gray-dark: #b0b0b0;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 8px 15px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, var(--gray-light) 0%, var(--gray-medium) 100%);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        [data-theme="dark"] body {
            color: #e0e0e0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: var(--primary-blue);
            color: var(--white);
            padding: 2rem 0;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--accent-gold);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            box-shadow: var(--shadow);
            font-size: 24px;
            z-index: 1000;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-hover);
        }

        .theme-toggle:active {
            transform: scale(0.95);
        }

        /* Hero Section */
        .hero {
            padding: 3rem 0;
            text-align: center;
            position: relative;
            background: linear-gradient(180deg, transparent 0%, var(--gray-light) 100%);
        }

        .parallax-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(26, 35, 126, 0.1) 0%, transparent 50%);
            z-index: -1;
            animation: parallax 10s ease-in-out infinite;
        }

        @keyframes parallax {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .current-week-card {
            background: var(--white);
            border-radius: 15px;
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            border: 3px solid var(--accent-gold);
            position: relative;
            overflow: hidden;
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        .current-week-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .current-week-card::before {
            content: "🧹";
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 100px;
            opacity: 0.1;
            transform: rotate(-15deg);
        }

        .current-badge {
            display: inline-block;
            background: var(--accent-gold);
            color: var(--primary-blue);
            padding: 0.5rem 1rem;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .week-info {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--gray-dark);
        }

        .group-name {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--primary-blue);
            margin-bottom: 0.5rem;
        }

        .chef-info {
            font-size: 1rem;
            color: var(--gray-dark);
        }

        .next-week {
            background: var(--white);
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .countdown-section {
            padding: 2rem 0;
            background: var(--white);
            margin-bottom: 2rem;
        }

        .countdown-container {
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .countdown-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            color: var(--primary-blue);
            margin-bottom: 1rem;
        }

        .countdown-display {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: var(--gray-light);
            border-radius: 10px;
            padding: 1rem;
            min-width: 80px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .countdown-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .countdown-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-blue);
            display: block;
        }

        .countdown-label {
            font-size: 0.8rem;
            color: var(--gray-dark);
            text-transform: uppercase;
        }

        .next-group-info {
            font-size: 1.1rem;
            color: var(--gray-dark);
            margin-top: 1rem;
        }

        .notification-section {
            padding: 1rem 0;
            text-align: center;
        }

        .notification-btn {
            background: var(--accent-gold);
            color: var(--primary-blue);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0.5rem;
        }

        .notification-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .notification-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .share-section {
            padding: 1rem 0;
            text-align: center;
        }

        .share-btn {
            background: var(--primary-blue);
            color: var(--white);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0.5rem;
        }

        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .export-section {
            padding: 1rem 0;
            text-align: center;
        }

        .export-btn {
            background: #4caf50;
            color: var(--white);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0.5rem;
        }

        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary-blue);
            color: var(--white);
            padding: 1rem 1.5rem;
            border-radius: 10px;
            box-shadow: var(--shadow-hover);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1001;
        }

        .toast.show {
            transform: translateX(0);
        }
        .search-section {
            padding: 3rem 0;
            background: var(--white);
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .search-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            color: var(--primary-blue);
            margin-bottom: 1.5rem;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid var(--gray-medium);
            border-radius: 50px;
            font-size: 1rem;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(26, 35, 126, 0.1);
        }

        .search-results {
            margin-top: 2rem;
            text-align: left;
        }

        .result-card {
            background: var(--gray-light);
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--primary-blue);
        }

        .result-card.error {
            border-left-color: #f44336;
            background: #ffebee;
        }

        /* Planning Section */
        .planning-section {
            padding: 3rem 0;
        }

        .section-title {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            color: var(--primary-blue);
            text-align: center;
            margin-bottom: 2rem;
        }

        .planning-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .week-card {
            background: var(--white);
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            border: 2px solid transparent;
            transform: translateY(0);
        }

        .week-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .week-card.current {
            border-color: var(--accent-gold);
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.1) 0%, var(--white) 100%);
        }

        .week-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .week-dates {
            font-weight: 600;
            color: var(--primary-blue);
        }

        .current-week-badge {
            background: var(--accent-gold);
            color: var(--primary-blue);
            padding: 0.25rem 0.75rem;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .group-info h3 {
            font-family: 'Poppins', sans-serif;
            color: var(--primary-blue);
            margin-bottom: 0.5rem;
        }

        .chef-name {
            color: var(--gray-dark);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .members-list {
            font-size: 0.85rem;
            color: var(--gray-dark);
            line-height: 1.4;
        }

        /* Groups Section */
        .groups-section {
            padding: 3rem 0;
            background: var(--white);
        }

        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .group-card {
            background: var(--gray-light);
            border-radius: 15px;
            padding: 2rem;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .group-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .group-card h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            color: var(--primary-blue);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .chef-section {
            background: var(--white);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--accent-gold);
        }

        .chef-label {
            font-size: 0.9rem;
            color: var(--gray-dark);
            margin-bottom: 0.25rem;
        }

        .chef-name {
            font-weight: 600;
            color: var(--primary-blue);
        }

        .members-section h4 {
            font-size: 1rem;
            color: var(--gray-dark);
            margin-bottom: 0.5rem;
        }

        .member-item {
            background: var(--white);
            padding: 0.5rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .member-item:hover {
            background: var(--primary-blue);
            color: var(--white);
            transform: translateX(5px);
        }

        /* Footer */
        footer {
            background: var(--primary-blue);
            color: var(--white);
            text-align: center;
            padding: 2rem 0;
            margin-top: 3rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .planning-grid {
                grid-template-columns: 1fr;
            }

            .groups-grid {
                grid-template-columns: 1fr;
            }

            .week-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
        }

        /* PWA Standalone Mode */
        .pwa-standalone .theme-toggle {
            top: 10px;
            right: 10px;
            width: 50px;
            height: 50px;
            font-size: 20px;
        }

        .pwa-standalone header {
            padding-top: 60px; /* Espace pour la status bar */
        }

        .pwa-standalone .hero {
            padding-top: 2rem;
        }

        .pwa-standalone .interactive-section {
            padding-bottom: 80px; /* Espace pour navigation mobile */
        }

        /* Installation prompt animation */
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Utility classes */
        .text-center { text-align: center; }
        .mb-1 { margin-bottom: 1rem; }
        .mb-2 { margin-bottom: 2rem; }
        .mt-2 { margin-top: 2rem; }

        /* Print styles */
        @media print {
            body {
                background: white !important;
                color: black !important;
            }
            
            .theme-toggle,
            .interactive-section,
            .countdown-section,
            .search-section {
                display: none !important;
            }
            
            .hero,
            .planning-section,
            .groups-section {
                page-break-inside: avoid;
            }
            
            .week-card,
            .group-card {
                break-inside: avoid;
                border: 1px solid #ccc !important;
                box-shadow: none !important;
            }
            
            h1, h2, h3 {
                color: black !important;
            }
            
            a {
                text-decoration: none !important;
                color: black !important;
            }
        }

        /* Responsive improvements */
        @media (max-width: 768px) {
            .countdown-display {
                gap: 0.5rem;
            }
            
            .countdown-item {
                min-width: 60px;
                padding: 0.5rem;
            }
            
            .countdown-number {
                font-size: 1.5rem;
            }
            
            .notification-btn,
            .share-btn,
            .export-btn {
                display: block;
                width: 100%;
                margin: 0.5rem 0;
            }
        }
    </style>
</head>

    <header>
        <div class="header-content">

    <button class="theme-toggle" id="themeToggle" aria-label="Basculer le thème">

    <main>
        <!-- Hero Section -->
        <section class="hero">
            <div class="parallax-bg"></div>
            <div class="container">
                <div class="current-week-card" id="currentWeekCard">

                <div class="next-week" id="nextWeekCard">

                </div>
            </div>
        </section>

        <!-- Countdown Section -->
        <section class="countdown-section">
            <div class="container">
                <div class="countdown-container">

                    <div class="countdown-display" id="countdownDisplay">

                    <div class="next-group-info" id="nextGroupInfo">
                        <!-- Content will be generated by JavaScript -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Interactive Features Section -->
        <section class="interactive-section">
            <div class="container">
                <div class="notification-section">
                    <button class="notification-btn" id="notificationBtn">

                    </button>
                    <button class="notification-btn" id="testNotificationBtn" style="display: none;">

                </div>
                
                <div class="share-section">

            </div>
        </section>

        <div class="toast" id="toast"></div>
        <section class="search-section">
            <div class="container">
                <div class="search-container">
                    <h2 class="search-title">🔍 Rechercher votre nom</h2>
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="search-input" 
                        placeholder="Tapez votre nom pour trouver votre groupe..."
                        autocomplete="off"
                    >
                    <div id="searchResults" class="search-results"></div>
                </div>
            </div>
        </section>

        <!-- Planning Section -->
        <section class="planning-section">
            <div class="container">
                <h2 class="section-title">📅 Planning sur 12 semaines</h2>
                <div id="planningGrid" class="planning-grid">
                    <!-- Content will be generated by JavaScript -->
                </div>
            </div>
        </section>

        <!-- Groups Section -->
        <section class="groups-section">
            <div class="container">
                <h2 class="section-title">👥 Les Groupes de Nettoyage</h2>
                <div id="groupsGrid" class="groups-grid">
                    <!-- Content will be generated by JavaScript -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Église du Christ de Nkoabang - Planning de Nettoyage</p>
        </div>
    </footer>

        const ordreRotation = [2, 0, 1];

        // Fonctions utilitaires
        function normalizeString(str) {
            return str
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .trim();
        }

        function getMondayOfWeek(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function getSundayOfWeek(date) {
            const monday = getMondayOfWeek(date);
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            return sunday;
        }

        function formatDate(date) {
            return date.toLocaleDateString('fr-FR', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
        }

        function getWeekNumber(date) {
            const referenceDate = new Date('2026-03-30'); // Lundi 30 mars 2026
            const mondayDate = getMondayOfWeek(date);
            
            const diffTime = Math.abs(mondayDate - referenceDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const weekNumber = Math.floor(diffDays / 7);
            
            return weekNumber;
        }

        function getGroupeForWeek(date) {
            const weekNumber = getWeekNumber(date);
            const groupeIndex = ordreRotation[weekNumber % 3];
            return groupes[groupeIndex];
        }

        function getWeekRange(monday) {
            const sunday = getSundayOfWeek(monday);
            return {
                monday: monday,
                sunday: sunday,
                text: `Du ${formatDate(monday)} au ${formatDate(sunday)}`
            };
        }

        function updateCountdown() {
            const now = new Date();
            const nextCleaningDate = getNextCleaningDate();
            const timeDiff = nextCleaningDate - now;
            
            // Debug : afficher les dates dans la console
            console.log('=== UPDATE COUNTDOWN ===');
            console.log('Now:', now);
            console.log('Next cleaning date:', nextCleaningDate);
            console.log('Time diff (ms):', timeDiff);
            console.log('Time diff (hours):', timeDiff / (1000 * 60 * 60));
            
            // Si le temps est écoulé, passer au prochain nettoyage
            if (timeDiff <= 0) {
                console.log('Time elapsed, moving to next week');
                const followingMonday = new Date(nextCleaningDate);
                followingMonday.setDate(followingMonday.getDate() + 7);
                updateCountdownDisplay(followingMonday);
                return;
            }
            
            updateCountdownDisplay(nextCleaningDate);
        }

        function getNextCleaningDate() {
            const today = new Date();
            const currentDay = today.getDay(); // 0 = Dimanche, 1 = Lundi, ..., 6 = Samedi
            const currentHour = today.getHours();
            
            console.log('=== GET NEXT CLEANING DATE ===');
            console.log('Today:', today);
            console.log('Day of week:', currentDay);
            console.log('Hour:', currentHour);
            
            let targetMonday = getMondayOfWeek(today);
            console.log('Current Monday:', targetMonday);
            
            // Si on est dimanche après 12h, passer à la semaine suivante
            if (currentDay === 0 && currentHour >= 12) {
                targetMonday.setDate(targetMonday.getDate() + 7);
                console.log('Sunday afternoon, moving to next Monday');
            }
            // Si on est passé lundi (mardi à samedi), passer à la semaine suivante
            else if (currentDay > 1) {
                targetMonday.setDate(targetMonday.getDate() + 7);
                console.log('Past Monday, moving to next Monday');
            }
            // Si on est lundi mais après le nettoyage (disons après 10h), passer à la semaine suivante
            else if (currentDay === 1 && currentHour >= 10) {
                targetMonday.setDate(targetMonday.getDate() + 7);
                console.log('Monday after cleaning, moving to next Monday');
            }
            
            // IMPORTANT : Viser le début de la journée (00h00) et non l'heure actuelle
            targetMonday.setHours(0, 0, 0, 0);
            console.log('Target Monday (start of day):', targetMonday);
            
            return targetMonday;
        }

        function isSameWeek(date1, monday) {
            const sunday = getSundayOfWeek(monday);
            return date1 >= monday && date1 <= sunday;
        }

        function updateCountdownDisplay(targetDate) {
            const countdownDisplay = document.getElementById('countdownDisplay');
            const nextGroupInfo = document.getElementById('nextGroupInfo');
            
            // Vérifier que les éléments existent
            if (!countdownDisplay || !nextGroupInfo) {
                console.log('Elements countdown non trouvés');
                return;
            }
            
            const now = new Date();
            const timeDiff = targetDate - now;
            
            // Debug : afficher les dates dans la console
            console.log('Now:', now);
            console.log('Target:', targetDate);
            console.log('Time diff:', timeDiff);
            
            if (timeDiff <= 0) {
                countdownDisplay.innerHTML = '<div class="countdown-item"><span class="countdown-number">0</span><span class="countdown-label">Jours</span></div>';
                nextGroupInfo.innerHTML = '<strong>Nettoyage terminé !</strong>';
                return;
            }
            
            const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);
            
            const nextGroupe = getGroupeForWeek(targetDate);
            const weekRange = getWeekRange(targetDate);
            
            countdownDisplay.innerHTML = `
                <div class="countdown-item">
                    <span class="countdown-number">${days}</span>
                    <span class="countdown-label">Jours</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number">${hours}</span>
                    <span class="countdown-label">Heures</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number">${minutes}</span>
                    <span class="countdown-label">Minutes</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number">${seconds}</span>
                    <span class="countdown-label">Secondes</span>
                </div>
            `;
            
            nextGroupInfo.innerHTML = `
                <strong>Prochain groupe :</strong> ${nextGroupe.nom} (${weekRange.text})
                <br><strong>Chef :</strong> ${nextGroupe.chef}
            `;
        }

                notificationPermission = permission === 'granted';

                    showToast('🔔 Notifications activées ! Vous recevrez des rappels.');
                    document.getElementById('notificationBtn').textContent = '🔕 Désactiver les rappels';
                    document.getElementById('testNotificationBtn').style.display = 'inline-block';
                    scheduleNotifications();
                } else {
                    showToast('⚠️ Notifications refusées. Activez-les dans les paramètres de votre navigateur.');
                }
                
                return notificationPermission;
            } else {
                showToast('⚠️ Votre navigateur ne supporte pas les notifications.');
                return false;
            }
        }

        function scheduleNotifications() {
            if (!notificationPermission) return;
            
            // Notification la veille du nettoyage
            const nextCleaning = getNextCleaningDate();
            const dayBefore = new Date(nextCleaning);
            dayBefore.setDate(dayBefore.getDate() - 1);
            dayBefore.setHours(9, 0, 0, 0);
            
            const now = new Date();
            const delay = dayBefore - now;
            
            if (delay > 0) {
                setTimeout(() => {
                    const groupe = getGroupeForWeek(nextCleaning);
                    new Notification('Rappel Nettoyage Église', {
                        body: `Demain c'est au tour du ${groupe.nom} de nettoyer l'église ! Chef : ${groupe.chef}`,
                        icon: '🧹',
                        tag: 'cleaning-reminder'
                    });
                }, delay);
            }
            
            // Notification le jour même
            const cleaningDay = new Date(nextCleaning);
            cleaningDay.setHours(8, 0, 0, 0);
            const cleaningDelay = cleaningDay - now;
            
            if (cleaningDelay > 0) {
                setTimeout(() => {
                    const groupe = getGroupeForWeek(nextCleaning);
                    new Notification("C'est jour de nettoyage !", {
                        body: `Aujourd'hui c'est au ${groupe.nom} de nettoyer l'église. Bon courage à toute l'équipe !`,
                        icon: '🧹',
                        tag: 'cleaning-day'
                    });
                }, cleaningDelay);
            }
        }

        function generateGroupCard(groupe) {
            return `

        function generateGroupsGrid() {

        }

        function searchPerson(name) {
            const normalizedName = normalizeString(name);
            
            for (const groupe of groupes) {
                // Vérifier le chef
                if (normalizeString(groupe.chef).includes(normalizedName)) {
                    return {
                        found: true,
                        person: groupe.chef,
                        role: 'Chef',
                        groupe: groupe
                    };
                }
                
                // Vérifier les membres
                for (const membre of groupe.membres) {
                    if (normalizeString(membre).includes(normalizedName)) {
                        return {
                            found: true,
                            person: membre,
                            role: 'Membre',
                            groupe: groupe
                        };
                    }
                }
            }
            
            return { found: false };
        }

        function getNextWeeksForGroup(groupe, weeksCount = 4) {
            const weeks = [];
            const today = new Date();
            
            for (let i = 0; i < weeksCount * 3; i++) {
                const monday = new Date(getMondayOfWeek(today));
                monday.setDate(monday.getDate() + (i * 7));
                const weekGroupe = getGroupeForWeek(monday);
                
                if (weekGroupe.id === groupe.id) {
                    weeks.push(getWeekRange(monday));
                    if (weeks.length >= weeksCount) break;
                }
            }
            
            return weeks;
        }

                const currentTheme = html.getAttribute('data-theme');

        document.head.appendChild(style);

        // Gérer les notifications PWA
        if ('Notification' in window && 'serviceWorker' in navigator) {
            // S'abonner aux notifications push si disponible
            navigator.serviceWorker.ready.then(function(registration) {
                return registration.pushManager.getSubscription()
                    .then(function(subscription) {
                        if (!subscription) {
                            // Pas encore abonné
                            console.log('Pas encore abonné aux notifications push');
                        } else {
                            console.log('Déjà abonné aux notifications push');
                        }
                    });
            });
        }

        // Détecter si l'app est lancée en mode standalone
        if (window.matchMedia('(display-mode: standalone)').matches) {
            console.log('Application lancée en mode standalone');
            document.body.classList.add('pwa-standalone');
        }

        window.addEventListener('appinstalled', function() {
            console.log('Application installée avec succès');
            showToast('🎉 Application installée ! Vous pouvez la trouver sur votre écran d\'accueil.');
        });
    </script>
</body>
</html>
